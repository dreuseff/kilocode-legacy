name: Sync fork from upstream

on:
  schedule:
    - cron: '13 3 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      UPSTREAM_REPO: Kilo-Org/kilocode-legacy
      BRANCH: main

    steps:
      - name: Show workflow context
        run: |
          echo "Fork repo: ${GITHUB_REPOSITORY}"
          echo "Upstream repo: ${UPSTREAM_REPO}"
          echo "Branch: ${BRANCH}"

      - name: Check whether fork is behind upstream
        id: check
        run: |
          set -euo pipefail

          behind_by=$(gh api \
            "/repos/${UPSTREAM_REPO}/compare/${BRANCH}...${GITHUB_REPOSITORY}:${BRANCH}" \
            --jq '.behind_by')

          echo "behind_by=${behind_by}" >> "$GITHUB_OUTPUT"

          if [ "${behind_by}" -gt 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            echo "Fork is behind upstream by ${behind_by} commit(s)."
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "Fork is already up to date."
          fi

      - name: Add summary
        run: |
          {
            echo "## Fork sync status"
            echo ""
            echo "- Fork repo: \`${GITHUB_REPOSITORY}\`"
            echo "- Upstream repo: \`${UPSTREAM_REPO}\`"
            echo "- Branch: \`${BRANCH}\`"
            echo "- behind_by: \`${{ steps.check.outputs.behind_by }}\`"
            echo "- Needs sync: \`${{ steps.check.outputs.has_changes }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Sync fork branch
        if: steps.check.outputs.has_changes == 'true'
        run: |
          set -euo pipefail

          gh repo sync "${GITHUB_REPOSITORY}" \
            --source "${UPSTREAM_REPO}" \
            --branch "${BRANCH}"

      - name: Report no sync needed
        if: steps.check.outputs.has_changes != 'true'
        run: echo "No upstream changes to sync."
